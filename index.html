<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>WB 10th Board Results</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: #f5f7fb;
  color: #111827;
  min-height: 100vh;
  padding: 16px;
}

form.board-reg-form,
.result-wrapper {
  max-width: 520px;
  margin: 20px auto;
  background: #ffffff;
  border-radius: 18px;
  padding: 22px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.06);
}

h4.h4 {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  margin-bottom: 10px;
  color: #111827;
}

label {
  display: block;
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 8px;
  color: #374151;
}

input,
select {
  width: 100%;
  padding: 14px;
  border: 1px solid #d1d5db;
  border-radius: 12px;
  outline: none;
  font-size: 15px;
  background: #fff;
  margin-bottom: 14px;
}

button,
.btn {
  width: 100%;
  border: none;
  border-radius: 14px;
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  background: #0f172a;
  color: #fff;
}

button:hover,
.btn:hover {
  opacity: 0.95;
}

.error {
  color: #dc2626;
  font-size: 14px;
  margin-top: 6px;
}

.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
  overflow-x: auto;
}

.table th,
.table td {
  border: 1px solid #e5e7eb;
  padding: 10px;
}

.table th {
  background: #f9fafb;
  font-weight: 700;
}

#printResult {
  width: auto;
  padding: 8px 14px;
  margin-left: 10px;
  font-size: 13px;
  border-radius: 10px;
}

.footer {
  text-align: center;
  font-size: 14px;
  padding: 18px 10px;
  color: #374151;
}

.footer .brand {
  color: #16a34a;
  font-weight: 700;
}

.rs-loader {
  position: fixed;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  z-index: 999;
  background: rgba(0,0,0,0.9);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  font-size: 16px;
  padding: 30px 20px;
  text-align: center;
}

@media (max-width: 480px) {
  form.board-reg-form,
  .result-wrapper {
    padding: 18px;
    margin: 10px auto;
  }

  h4.h4 {
    font-size: 20px;
  }

  .table th,
  .table td {
    font-size: 13px;
    padding: 8px;
  }
}
</style>
</head>
<body>
  <div class="container">
    <div class="card" id="formCard">
      <h1>WB 10th Board Results</h1>
      <p class="subtitle">Check your Madhyamik 2026 result instantly</p>

      <form id="resultForm">
        <label>Roll Number</label>
        <input
          type="text"
          name="roll_n"
          placeholder="Enter Roll Number"
          oninput="this.value=this.value.toUpperCase()"
        />
        <div class="error" id="rollErr"></div>

        <label>Date of Birth</label>
        <div class="dob-grid">
          <select name="day">
            <option value="01">01</option><option value="02">02</option><option value="03">03</option><option value="04">04</option><option value="05">05</option><option value="06">06</option><option value="07">07</option><option value="08">08</option><option value="09">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option><option value="13">13</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="19">19</option><option value="20">20</option><option value="21">21</option><option value="22">22</option><option value="23">23</option><option value="24">24</option><option value="25">25</option><option value="26">26</option><option value="27">27</option><option value="28">28</option><option value="29">29</option><option value="30">30</option><option value="31">31</option>
          </select>

          <select name="month">
            <option value="01">Jan (01)</option><option value="02">Feb (02)</option><option value="03">Mar (03)</option><option value="04">Apr (04)</option><option value="05">May (05)</option><option value="06">Jun (06)</option><option value="07">Jul (07)</option><option value="08">Aug (08)</option><option value="09">Sep (09)</option><option value="10">Oct (10)</option><option value="11">Nov (11)</option><option value="12">Dec (12)</option>
          </select>

          <select name="year">
            <option value="90">1990</option><option value="91">1991</option><option value="92">1992</option><option value="93">1993</option><option value="94">1994</option><option value="95">1995</option><option value="96">1996</option><option value="97">1997</option><option value="98">1998</option><option value="99">1999</option><option value="00">2000</option><option value="01">2001</option><option value="02">2002</option><option value="03">2003</option><option value="04">2004</option><option value="05">2005</option><option value="06">2006</option><option value="07">2007</option><option value="08">2008</option><option value="09">2009</option><option value="10">2010</option><option value="11">2011</option><option value="12">2012</option><option value="13">2013</option><option value="14">2014</option><option value="15">2015</option><option value="16">2016</option>
          </select>
        </div>
        <div class="error" id="applErr"></div>

        <button type="submit" class="primary-btn">Search Result</button>
      </form>

      <div class="loader" id="loadingSpinner">Please wait, fetching result...</div>
    </div>

    <div class="card hidden" id="resultWrapper">
      <div class="table-wrap" id="resultTable"></div>
      <button class="secondary-btn" onclick="location.reload()">Check Another Result</button>
    </div>

    <div class="footer">
      Made with ❤️ by Vishal | <span class="brand">RAIGANJLOOTERS</span>
    </div>
  </div>

  <script>
    const spinner = document.getElementById('loadingSpinner');
    const rollErr = document.getElementById('rollErr');
    const applErr = document.getElementById('applErr');

    async function getApiResponse(url) {
      try {
        const response = await fetch(url + '?t=' + Date.now(), {
          cache: 'no-store'
        });

        if (!response.ok) {
          throw new Error('Record not found');
        }

        return await response.json();
      } catch (e) {
        rollErr.innerText = 'Record not found or API error.';
        return null;
      }
    }

    document.getElementById('resultForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      rollErr.innerText = '';
      applErr.innerText = '';
      spinner.style.display = 'block';

      const formData = new FormData(this);
      const roll = (formData.get('roll_n') || '').trim().toUpperCase();
      const date = `${formData.get('day')}${formData.get('month')}${formData.get('year')}`;

      if (!roll) {
        spinner.style.display = 'none';
        rollErr.innerText = 'Roll Number is required.';
        return;
      }

      const url = `https://boardresultapi.abplive.com/wb/2026/10/${roll}/${date}`;
      const result = await getApiResponse(url);
      spinner.style.display = 'none';

      if (result) {
        document.getElementById('formCard').classList.add('hidden');
        document.getElementById('resultWrapper').classList.remove('hidden');

        document.getElementById('resultTable').innerHTML = `
          <table>
            <tr><th colspan="2">WB Board 10th Result</th></tr>
            <tr><td>Roll Number</td><td>${result.Roll_No || '-'}</td></tr>
            <tr><td>Student Name</td><td>${result.Name || '-'}</td></tr>
            <tr><td>Aggregate</td><td>${result.Aggregate || '-'}</td></tr>
            <tr><td>Overall Grade</td><td>${result.Overall_Grade || '-'}</td></tr>
            <tr><td>Remarks</td><td>${result.Remarks || '-'}</td></tr>
          </table>
        `;
      }
    });
  </script>
</body>
</html>
