<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>WB 10th Board Results</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: #f5f7fb;
      color: #111827;
      min-height: 100vh;
      padding: 16px;
    }

    .container {
      max-width: 520px;
      margin: auto;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      margin-bottom: 18px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 22px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input, select {
      width: 100%;
      padding: 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      outline: none;
      font-size: 15px;
      background: #fff;
      margin-bottom: 14px;
    }

    .dob-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .primary-btn {
      background: #0f172a;
      color: white;
    }

    .secondary-btn {
      background: #2563eb;
      color: white;
      margin-top: 16px;
    }

    .error {
      color: #dc2626;
      font-size: 14px;
      margin-top: 6px;
    }

    .loader {
      display: none;
      text-align: center;
      padding: 18px;
      font-size: 14px;
      color: #374151;
    }

    .table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      border: 1px solid #e5e7eb;
      padding: 10px;
      text-align: left;
    }

    th {
      background: #f9fafb;
      font-weight: 700;
    }

    .footer {
      text-align: center;
      font-size: 14px;
      padding: 18px 10px;
      color: #374151;
    }

    .brand {
      color: #16a34a;
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 20px;
      }

      .card {
        padding: 18px;
      }

      th, td {
        font-size: 13px;
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card" id="formCard">
      <h1>WB 10th Board Results</h1>
      <p class="subtitle">Check your Madhyamik 2026 result instantly</p>

      <form id="resultForm">
        <label>Roll Number</label>
        <input
          type="text"
          name="roll_n"
          placeholder="Enter Roll Number"
          oninput="this.value=this.value.toUpperCase()"
        />
        <div class="error" id="rollErr"></div>

        <label>Date of Birth</label>
        <div class="dob-grid">
          <select name="day">
            <option value="18">18</option>
          </select>
          <select name="month">
            <option value="08">Aug</option>
          </select>
          <select name="year">
            <option value="09">2009</option>
          </select>
        </div>
        <div class="error" id="applErr"></div>

        <button type="submit" class="primary-btn">Search Result</button>
      </form>

      <div class="loader" id="loadingSpinner">Please wait, fetching result...</div>
    </div>

    <div class="card hidden" id="resultWrapper">
      <div class="table-wrap" id="resultTable"></div>
      <button class="secondary-btn" onclick="location.reload()">Check Another Result</button>
    </div>

    <div class="footer">
      Made with ❤️ by Vishal | <span class="brand">RAIGANJLOOTERS</span>
    </div>
  </div>

  <script>
    // Force fresh load every refresh
    if (window.performance && performance.navigation.type === 1) {
      window.location.reload(true);
    }

    const spinner = document.getElementById('loadingSpinner');
    const rollErr = document.getElementById('rollErr');
    const applErr = document.getElementById('applErr');

    async function getApiResponse(url) {
      try {
        const response = await fetch(url + '?t=' + Date.now(), {
          cache: 'no-store'
        });

        if (!response.ok) {
          throw new Error('Record not found');
        }

        return await response.json();
      } catch (e) {
        rollErr.innerText = 'Record not found or API error.';
        return null;
      }
    }

    document.getElementById('resultForm').addEventListener('submit', async function(e) {
      e.preventDefault();

      rollErr.innerText = '';
      applErr.innerText = '';
      spinner.style.display = 'block';

      const formData = new FormData(this);
      const roll = (formData.get('roll_n') || '').trim().toUpperCase();
      const date = `${formData.get('day')}${formData.get('month')}${formData.get('year')}`;

      if (!roll) {
        spinner.style.display = 'none';
        rollErr.innerText = 'Roll Number is required.';
        return;
      }

      const url = `https://boardresultapi.abplive.com/wb/2026/10/${roll}/${date}`;
      const result = await getApiResponse(url);
      spinner.style.display = 'none';

      if (result) {
        document.getElementById('formCard').classList.add('hidden');
        document.getElementById('resultWrapper').classList.remove('hidden');

        document.getElementById('resultTable').innerHTML = `
          <table>
            <tr><th colspan="2">WB Board 10th Result</th></tr>
            <tr><td>Roll Number</td><td>${result.Roll_No || '-'}</td></tr>
            <tr><td>Student Name</td><td>${result.Name || '-'}</td></tr>
            <tr><td>Aggregate</td><td>${result.Aggregate || '-'}</td></tr>
            <tr><td>Overall Grade</td><td>${result.Overall_Grade || '-'}</td></tr>
            <tr><td>Remarks</td><td>${result.Remarks || '-'}</td></tr>
          </table>
        `;
      }
    });
  </script>
</body>
</html>
