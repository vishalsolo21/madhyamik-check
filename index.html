  <script>
    var getUrlParam = (param) => {
      const queryString = window.location.search;
      const urlParams = new URLSearchParams(queryString);
      return urlParams.get(param);
    };
    var postHeight = function () {
      let bodyHeight = document.body.scrollHeight;
      if (bodyHeight > 200) {
        window.parent.postMessage({
            iframeId: 'boardResultFormWB',
            type: 'resize-iframe',
            height: bodyHeight,
          },
          '*'
        );
      }
    };
    window.onload = function () {
      postHeight();
      const boardName = getUrlParam('board');
      const boardClass = getUrlParam('class');
      // document.getElementById('boardName').innerText = boardName;
      // document.getElementById('boardClass').innerText = boardClass;
    };
  </script>
  <script>
    var spinner = document.getElementById('loadingSpinner');
    var rollErr = document.getElementById('rollErr');
    var applErr = document.getElementById('applErr');
    const getApiResponse = async (endPoint) => {
      try {
        const response = await fetch(endPoint, { cache: "default" });

        setTimeout(function () {
          
          spinner.classList.add('d-none');
          spinner.parentElement.classList.remove('disabled');
          spinner.parentElement.removeAttribute('disabled');
        }, 3000);
        if (response.status !== 200) {
          if(response.status == 404) {
            spinner.classList.add('d-none');
            spinner.parentElement.classList.remove('disabled');
            spinner.parentElement.removeAttribute('disabled');
            rollErr.innerText = 'Record Not found! Please Retry.';
            throw new Error(`Page Not found! Status Code: ${response.status}`);
            setTimeout(function () {location.reload();}, 5000);
          }
        }          
        const result = await response.json();
        return result;
      } catch (error) {
        console.log(error);
        setTimeout(function () {spinner.classList.add('d-none')}, 3000);
        spinner.parentElement.classList.remove('disabled');
        spinner.parentElement.removeAttribute('disabled');
        rollErr.innerText = 'Error! Please Retry.';
      }
    };

    document.getElementById('resultForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      (adsbygoogle = window.adsbygoogle || []).push({});
      spinner.classList.remove('d-none');
      spinner.parentElement.classList.add('disabled');
      spinner.parentElement.setAttribute('disabled', 'disabled');
      const formData = new FormData(e.target);
      let data = Array.from(formData.entries()).reduce(
        (memo, pair) => ({
          ...memo,
          [pair[0]]: pair[1],
        }), {}
      );
      data.roll_n = data.roll_n.toUpperCase().trim();
      var errors = 0;
      rollErr.innerHTML = '';
      applErr.innerHTML = '';
      const roll_n = data.roll_n;
      if (roll_n == '') {
        rollErr.innerText = 'Reg. Number is mandatory.';
        errors = 1;
      }
      const date = `${data.day}${data.month}${data.year}`;
      if (date == '') {
        applErr.innerText = 'Date of birth is mandatory.';
        errors = 1;
      }
      if (errors == 1) {
        spinner.classList.add('d-none');
        spinner.parentElement.classList.remove('disabled');
        spinner.parentElement.removeAttribute('disabled');
        return false;
      } else {
        //url = `https://snno51kbvd.execute-api.ap-south-1.amazonaws.com/Staging/getdata/${roll_n}/${date}`;
        url = `https://boardresultapi.abplive.com/wb/2026/10/${roll_n}/${date}`;

        const results = await getApiResponse(url);
        // spinner.classList.add('d-none');
        // spinner.parentElement.classList.remove('disabled');
        // spinner.parentElement.removeAttribute('disabled');
        if (typeof results!== 'undefined' && results!='') {
          document.getElementById('resultForm').classList.add('d-none');
          generateResultTable(results, data);
        } else {
          //data_res.Count = 'NOT ENROLLED';
          rollErr.innerText = 'NOT ENROLLED';
          setTimeout(function () {location.reload();}, 5000);
        }

      }
    });

    function checkAnotherResult() {
      const pagetype = getUrlParam("pagetype");
      if (pagetype == "amp") {
        document.getElementById('resultForm').reset();
        document.getElementById('resultForm').classList.remove('d-none');
        document.getElementById('resultWrapper').classList.add('d-none');
      } else { location.reload();
        // window.parent.postMessage({
        //     type: 'reload-page',
        //   },
        //   '*'
        // );
        // postHeight();
      }
    }

    function generateResultTable(result, data) {
      let personalHtml = '';
      let subjectsHtml =
        `<tr><th style="font-size:14px; font-weight:bold;">Subject</th><th style="text-align:center;font-size:14px; font-weight:bold;">Marks/Grades</th></tr>`;
      const boardName = 'WB Board';
      const boardClass = '10th';
      const subjects = ["First_Language", "Second_Language", "Mathematics", "Physical_Science", "Life_Science",
        "History", "Geography", "Opt_Elec"
      ];

      personalHtml = `<tr><td width="40%">Roll Number</td><td>${result.Roll_No}</td></tr><tr><td width="40%">STUDENT'S NAME</td><td>${result.Name}</td></tr>`;
      subjects.forEach(subject => {
        // if (result[`${subject}_Marks`] && result[`${subject}_Marks`] > 0) {
        const marks = result[`${subject}_Marks`].trim();
        const grade = result[`${subject}_Grade`].trim();
        subjectsHtml += `<tr>
            <td width="40%">${subject.split("_").join(" ")} Marks</td>
            <td style="text-align:center;">${marks}</td>
          </tr>
          <tr>
            <td width="40%">${subject.split("_").join(" ")} Grade</td>
            <td style="text-align:center;">${grade}</td>
          </tr>`;
        // }
      });

      remarksHtml = `
      <tr><td width="40%" style="text-align:right">Aggregate</td><td style="font-size:16px;font-weight:bold;">${result.Aggregate}</td></tr>
      <tr><td width="40%" style="text-align:right">Overall Grade</td><td style="font-size:16px;font-weight:bold;">${result.Overall_Grade}</td></tr>
      <tr><td width="40%" style="text-align:right">Remarks</td><td style="font-size:16px;font-weight:bold;">${result.Remarks}</td></tr>
      `;

      const resultTableHtml =
        `<table class="table" width="100%" border="1" id="marksheet"><thead><tr><th colspan="6"><span class="result-title" style="font-size:16px;">${boardName} ${boardClass} Result</span><button class="" id="printResult" onclick="window.print();">Print</button></th></tr>${personalHtml}</thead><tbody>${subjectsHtml}${remarksHtml}<tfoot><tr><td colspan="5"><small class="disclaimer"><strong>Disclaimer: </strong>"Provisional results of Madhyamik Pariksha, 2026 have been published by WBBSE with a view to providing immediate information to the examinees. These cannot be treated as original mark sheets. West Bengal Board of Secondary Education is not responsible for any inadvertent error that might have crept in the results of Madhyamik Pariksha, 2026 being published through this Website."</small></td></tr></tfoot></table>`;
      document.getElementById('resultWrapper').classList.remove('d-none');
      document.getElementById('resultTable').innerHTML = resultTableHtml;
      postHeight();
    }
  </script>
